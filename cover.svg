<svg width="1280" height="560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; }
    </style>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#00000016"/>
    </filter>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#E0DDD8"/>
    </pattern>
    <clipPath id="avatar-clip-martin"><circle cx="96" cy="78" r="34"/></clipPath>
    <clipPath id="avatar-clip-carlos"><circle cx="96" cy="78" r="34"/></clipPath>
    <clipPath id="avatar-clip-ana"><circle cx="96" cy="78" r="34"/></clipPath>
    <clipPath id="avatar-clip-diego"><circle cx="96" cy="78" r="34"/></clipPath>
    <clipPath id="avatar-clip-valentina"><circle cx="96" cy="78" r="34"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1280" height="560" fill="#FAFAF9"/>
  <rect width="1280" height="560" fill="url(#dots)" opacity="0.5"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="#2383E2"/>

  <!-- === TITLE AREA === -->
  <text x="640" y="150" font-size="68" font-weight="700" fill="#191919" text-anchor="middle" letter-spacing="-2">Personas sintéticas</text>

  <!-- Tagline -->
  <text x="640" y="198" font-size="20" font-weight="400" fill="#9B9A97" text-anchor="middle">Panel de usuarios sintéticos para research y decisiones de producto</text>

  <!-- Divider -->
  <line x1="520" y1="224" x2="760" y2="224" stroke="#E3E2DE" stroke-width="1.5"/>

  <!-- === PERSONA CARDS === -->

  <!-- ── MARTÍN ── -->
  <g transform="translate(112, 280)">
    <rect width="192" height="232" rx="16" fill="#FFFFFF" filter="url(#card-shadow)"/>
    <rect width="192" height="6" rx="3" fill="#2383E2"/>

    <!-- Avatar background -->
    <circle cx="96" cy="78" r="34" fill="#DBEAFE"/>

    <!-- Martín: cara + auriculares -->
    <g clip-path="url(#avatar-clip-martin)">
      <!-- Cuello -->
      <rect x="88" y="98" width="16" height="14" fill="#F5CBA7"/>
      <!-- Hombros/remera -->
      <ellipse cx="96" cy="118" rx="28" ry="14" fill="#2383E2"/>
      <!-- Cara -->
      <circle cx="96" cy="82" r="19" fill="#F5CBA7"/>
      <!-- Pelo castaño, un poco despeinado -->
      <ellipse cx="96" cy="65" rx="20" ry="10" fill="#5C3D2E"/>
      <ellipse cx="78" cy="72" rx="7" ry="12" fill="#5C3D2E"/>
      <ellipse cx="114" cy="72" rx="7" ry="12" fill="#5C3D2E"/>
      <rect x="76" y="63" width="40" height="10" fill="#5C3D2E"/>
      <!-- Auricular izq -->
      <rect x="64" y="75" width="13" height="16" rx="5" fill="#1D4ED8"/>
      <!-- Auricular der -->
      <rect x="115" y="75" width="13" height="16" rx="5" fill="#1D4ED8"/>
      <!-- Arco auricular -->
      <path d="M 70 80 Q 96 55 122 80" stroke="#1D4ED8" stroke-width="5" fill="none"/>
      <!-- Ojos -->
      <circle cx="89" cy="80" r="2.8" fill="#3D2B1F"/>
      <circle cx="103" cy="80" r="2.8" fill="#3D2B1F"/>
      <!-- Brillo ojos -->
      <circle cx="90.5" cy="78.5" r="1" fill="white"/>
      <circle cx="104.5" cy="78.5" r="1" fill="white"/>
      <!-- Sonrisa -->
      <path d="M 89 89 Q 96 95 103 89" stroke="#3D2B1F" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>

    <text x="96" y="134" font-size="20" text-anchor="middle">🇦🇷</text>
    <text x="96" y="162" font-size="17" font-weight="700" fill="#191919" text-anchor="middle">Martín</text>
    <text x="96" y="181" font-size="12" fill="#9B9A97" text-anchor="middle">Freelancer argentino</text>
    <rect x="46" y="192" width="100" height="22" rx="11" fill="#DBEAFE"/>
    <text x="96" y="207" font-size="11" font-weight="600" fill="#2383E2" text-anchor="middle">PayPal → ARS</text>
  </g>

  <!-- ── CARLOS ── -->
  <g transform="translate(328, 280)">
    <rect width="192" height="232" rx="16" fill="#FFFFFF" filter="url(#card-shadow)"/>
    <rect width="192" height="6" rx="3" fill="#D97706"/>

    <circle cx="96" cy="78" r="34" fill="#FEF3C7"/>

    <g clip-path="url(#avatar-clip-carlos)">
      <!-- Cuello -->
      <rect x="88" y="98" width="16" height="14" fill="#C68642"/>
      <!-- Camisa -->
      <ellipse cx="96" cy="118" rx="28" ry="14" fill="#92400E"/>
      <!-- Cara -->
      <circle cx="96" cy="82" r="19" fill="#C68642"/>
      <!-- Sombrero ala -->
      <ellipse cx="96" cy="63" rx="26" ry="6" fill="#1C1917"/>
      <!-- Sombrero copa -->
      <rect x="82" y="40" width="28" height="26" rx="5" fill="#1C1917"/>
      <!-- Banda del sombrero -->
      <rect x="82" y="59" width="28" height="5" fill="#D97706"/>
      <!-- Cabello lateral -->
      <rect x="77" y="66" width="7" height="18" rx="3" fill="#1C1917"/>
      <rect x="108" y="66" width="7" height="18" rx="3" fill="#1C1917"/>
      <!-- Ojos -->
      <circle cx="89" cy="80" r="2.8" fill="#1C1917"/>
      <circle cx="103" cy="80" r="2.8" fill="#1C1917"/>
      <circle cx="90.5" cy="78.5" r="1" fill="white"/>
      <circle cx="104.5" cy="78.5" r="1" fill="white"/>
      <!-- Bigote -->
      <path d="M 87 89 Q 92 86 96 88 Q 100 86 105 89" stroke="#1C1917" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>

    <text x="96" y="134" font-size="20" text-anchor="middle">🇧🇴</text>
    <text x="96" y="162" font-size="17" font-weight="700" fill="#191919" text-anchor="middle">Carlos</text>
    <text x="96" y="181" font-size="12" fill="#9B9A97" text-anchor="middle">Comerciante boliviano</text>
    <rect x="38" y="192" width="116" height="22" rx="11" fill="#FEF3C7"/>
    <text x="96" y="207" font-size="11" font-weight="600" fill="#D97706" text-anchor="middle">BOB → USD</text>
  </g>

  <!-- ── ANA ── -->
  <g transform="translate(544, 280)">
    <rect width="192" height="232" rx="16" fill="#FFFFFF" filter="url(#card-shadow)"/>
    <rect width="192" height="6" rx="3" fill="#DC2626"/>

    <circle cx="96" cy="78" r="34" fill="#FEE2E2"/>

    <g clip-path="url(#avatar-clip-ana)">
      <!-- Pelo largo (capa trasera) -->
      <ellipse cx="96" cy="96" rx="24" ry="30" fill="#2C1810"/>
      <ellipse cx="75" cy="88" rx="10" ry="22" fill="#2C1810"/>
      <ellipse cx="117" cy="88" rx="10" ry="22" fill="#2C1810"/>
      <!-- Cuello -->
      <rect x="88" y="98" width="16" height="14" fill="#8D5524"/>
      <!-- Blusa -->
      <ellipse cx="96" cy="118" rx="28" ry="14" fill="#DC2626"/>
      <!-- Cara -->
      <circle cx="96" cy="80" r="19" fill="#8D5524"/>
      <!-- Pelo frontal -->
      <ellipse cx="96" cy="63" rx="21" ry="9" fill="#2C1810"/>
      <!-- Ojos expresivos (un poco más grandes) -->
      <circle cx="89" cy="78" r="3.2" fill="#2C1810"/>
      <circle cx="103" cy="78" r="3.2" fill="#2C1810"/>
      <circle cx="90.5" cy="76.5" r="1.2" fill="white"/>
      <circle cx="104.5" cy="76.5" r="1.2" fill="white"/>
      <!-- Sonrisa cálida -->
      <path d="M 87 87 Q 96 95 105 87" stroke="#2C1810" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <!-- Aretes pequeños -->
      <circle cx="77" cy="82" r="3" fill="#FCA5A5"/>
      <circle cx="115" cy="82" r="3" fill="#FCA5A5"/>
    </g>

    <text x="96" y="134" font-size="20" text-anchor="middle">🇻🇪</text>
    <text x="96" y="162" font-size="17" font-weight="700" fill="#191919" text-anchor="middle">Ana</text>
    <text x="96" y="181" font-size="12" fill="#9B9A97" text-anchor="middle">Venezolana · Remesas</text>
    <rect x="44" y="192" width="104" height="22" rx="11" fill="#FEE2E2"/>
    <text x="96" y="207" font-size="11" font-weight="600" fill="#DC2626" text-anchor="middle">USD → VES</text>
  </g>

  <!-- ── DIEGO ── -->
  <g transform="translate(760, 280)">
    <rect width="192" height="232" rx="16" fill="#FFFFFF" filter="url(#card-shadow)"/>
    <rect width="192" height="6" rx="3" fill="#7C3AED"/>

    <circle cx="96" cy="78" r="34" fill="#EDE9FE"/>

    <g clip-path="url(#avatar-clip-diego)">
      <!-- Cuello -->
      <rect x="88" y="98" width="16" height="14" fill="#FDDBB4"/>
      <!-- Remera oscura -->
      <ellipse cx="96" cy="118" rx="28" ry="14" fill="#4C1D95"/>
      <!-- Cara -->
      <circle cx="96" cy="82" r="19" fill="#FDDBB4"/>
      <!-- Pelo negro despeinado / puntas -->
      <ellipse cx="96" cy="64" rx="20" ry="9" fill="#111827"/>
      <polygon points="80,66 76,52 82,64" fill="#111827"/>
      <polygon points="96,61 93,48 99,61" fill="#111827"/>
      <polygon points="112,66 116,52 110,64" fill="#111827"/>
      <rect x="76" y="62" width="40" height="8" fill="#111827"/>
      <!-- Lentes rectangulares -->
      <rect x="79" y="76" width="14" height="10" rx="3" fill="none" stroke="#7C3AED" stroke-width="2.5"/>
      <rect x="99" y="76" width="14" height="10" rx="3" fill="none" stroke="#7C3AED" stroke-width="2.5"/>
      <line x1="93" y1="81" x2="99" y2="81" stroke="#7C3AED" stroke-width="2"/>
      <line x1="79" y1="81" x2="75" y2="82" stroke="#7C3AED" stroke-width="2"/>
      <line x1="113" y1="81" x2="117" y2="82" stroke="#7C3AED" stroke-width="2"/>
      <!-- Ojos detrás de lentes -->
      <circle cx="86" cy="81" r="2.2" fill="#111827"/>
      <circle cx="106" cy="81" r="2.2" fill="#111827"/>
      <!-- Boca neutral / seria -->
      <line x1="90" y1="91" x2="102" y2="91" stroke="#111827" stroke-width="1.8" stroke-linecap="round"/>
    </g>

    <text x="96" y="134" font-size="20" text-anchor="middle">🌐</text>
    <text x="96" y="162" font-size="17" font-weight="700" fill="#191919" text-anchor="middle">Diego</text>
    <text x="96" y="181" font-size="12" fill="#9B9A97" text-anchor="middle">Usuario crypto</text>
    <rect x="46" y="192" width="100" height="22" rx="11" fill="#EDE9FE"/>
    <text x="96" y="207" font-size="11" font-weight="600" fill="#7C3AED" text-anchor="middle">USDT → Fiat</text>
  </g>

  <!-- ── VALENTINA ── -->
  <g transform="translate(976, 280)">
    <rect width="192" height="232" rx="16" fill="#FFFFFF" filter="url(#card-shadow)"/>
    <rect width="192" height="6" rx="3" fill="#059669"/>

    <circle cx="96" cy="78" r="34" fill="#D1FAE5"/>

    <g clip-path="url(#avatar-clip-valentina)">
      <!-- Pelo rizado voluminoso (capa trasera) -->
      <circle cx="76" cy="70" r="12" fill="#2C1810"/>
      <circle cx="83" cy="60" r="12" fill="#2C1810"/>
      <circle cx="96" cy="57" r="12" fill="#2C1810"/>
      <circle cx="109" cy="60" r="12" fill="#2C1810"/>
      <circle cx="116" cy="70" r="12" fill="#2C1810"/>
      <circle cx="74" cy="82" r="10" fill="#2C1810"/>
      <circle cx="118" cy="82" r="10" fill="#2C1810"/>
      <!-- Cuello -->
      <rect x="88" y="98" width="16" height="14" fill="#8D5524"/>
      <!-- Blusa -->
      <ellipse cx="96" cy="118" rx="28" ry="14" fill="#059669"/>
      <!-- Cara -->
      <circle cx="96" cy="82" r="19" fill="#8D5524"/>
      <!-- Ojos -->
      <circle cx="89" cy="79" r="3" fill="#2C1810"/>
      <circle cx="103" cy="79" r="3" fill="#2C1810"/>
      <circle cx="90.5" cy="77.5" r="1.1" fill="white"/>
      <circle cx="104.5" cy="77.5" r="1.1" fill="white"/>
      <!-- Sonrisa grande -->
      <path d="M 86 89 Q 96 98 106 89" stroke="#2C1810" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Flor en el pelo (costado derecho) -->
      <circle cx="116" cy="61" r="4" fill="#FDE68A"/>
      <circle cx="122" cy="57" r="3.5" fill="#FDE68A"/>
      <circle cx="122" cy="65" r="3.5" fill="#FDE68A"/>
      <circle cx="116" cy="55" r="3.5" fill="#FDE68A"/>
      <circle cx="110" cy="57" r="3.5" fill="#FDE68A"/>
      <circle cx="110" cy="65" r="3.5" fill="#FDE68A"/>
      <circle cx="116" cy="61" r="3" fill="#F59E0B"/>
    </g>

    <text x="96" y="134" font-size="20" text-anchor="middle">🇨🇴</text>
    <text x="96" y="162" font-size="17" font-weight="700" fill="#191919" text-anchor="middle">Valentina</text>
    <text x="96" y="181" font-size="12" fill="#9B9A97" text-anchor="middle">Freelancer colombiana</text>
    <rect x="40" y="192" width="112" height="22" rx="11" fill="#D1FAE5"/>
    <text x="96" y="207" font-size="11" font-weight="600" fill="#059669" text-anchor="middle">PayPal → Nequi</text>
  </g>

  <!-- Footer -->
  <text x="640" y="536" font-size="13" fill="#CECCC8" text-anchor="middle" letter-spacing="0.3">5 personas · datos reales · arquitectura generativa</text>

</svg>
